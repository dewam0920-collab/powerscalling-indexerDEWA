<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dewa Power-Scaling Indexer</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #58a6ff; margin-top: 50px; text-align: center; }
        .search-container { width: 100%; max-width: 500px; margin-top: 30px; }
        input[type="text"] {
            width: 100%; padding: 12px 20px; border-radius: 6px;
            border: 1px solid #30363d; background-color: #0d1117; color: white;
            font-size: 16px; box-sizing: border-box;
        }
        button {
            width: 100%; margin-top: 10px; padding: 12px;
            background-color: #238636; color: white; border: none;
            border-radius: 6px; font-weight: bold; cursor: pointer;
        }
        button:hover { background-color: #2ea043; }
        .info { width: 100%; max-width: 500px; margin-top: 20px; font-size: 14px; color: #c9d1d9; }
        .result-box {
            background-color: #161b22; padding: 20px; border-radius: 8px;
            border: 1px solid #30363d; box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .result-box h3 { color: #58a6ff; margin-top: 0; text-transform: uppercase; }
        .error-msg { color: #f85149; text-align: center; font-weight: bold; }
        /* Tambahan style untuk link agar terlihat rapi */
        a { color: #58a6ff; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        ul { margin-top: 5px; padding-left: 20px; }
    </style>
</head>
<body>

    <h1>Power-Scaling Indexer</h1>
    <p style="text-align: center; color: #8b949e;">Database Feats, Calc, & Tiering Karakter</p>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Cari karakter (contoh: Makima, Jin Mori)...">
        <button onclick="searchCharacter()">Cari Data</button>
    </div>

    <div id="results" class="info"></div>

    <script>
        const databaseKarakter = {
            "makima": {
                tier: "7-C (Town level) secara fisik, Unknown dengan Hax",
                feats: `
                    <ul>
                        <li><b>Kontrol Mental:</b> Dapat mengendalikan eksistensi yang ia anggap lebih rendah darinya.</li>
                        <li><b>Immortality (Tipe 8):</b> Transfer fatal damage ke warga negara Jepang secara acak.</li>
                        <li><b>Bang!:</b> Proyeksi energi kinetik tak kasat mata ke target.</li>
                    </ul>
                `,
                calc: "Kecepatan Hypersonic+ (Mampu bereaksi terhadap tembakan Gun Devil sejauh 500km).",
                link_rt: "<a href='https://www.reddit.com/r/respectthreads/comments/xkcf5l/respect_makima_chainsaw_man/' target='_blank'>[Baca Respect Thread Reddit]</a>",
                link_bukti: "<a href='https://vsbattles.fandom.com/wiki/Makima' target='_blank'>[Lihat Profil Kalkulasi VS Battles]</a>"
            },
            "jin mori": {
                tier: "Low 2-C (Universe level+)",
                feats: "Mematikan alam semesta dengan tendangan.",
                calc: "Kecepatan MFTL+.",
                link_rt: "<a href='#' target='_blank'>[Belum Ada Link]</a>",
                link_bukti: "<a href='#' target='_blank'>[Belum Ada Link]</a>"
            }
        };

        function searchCharacter() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const results = document.getElementById('results');
            
            if(query !== "") {
                if(databaseKarakter[query]) {
                    const data = databaseKarakter[query];
                    // Menambahkan baris untuk Link dan Sumber ke tampilan web
                    results.innerHTML = `
                        <div class="result-box">
                            <h3>${query}</h3>
                            <p><b>Tier:</b> ${data.tier}</p>
                            <p><b>Feats Utama:</b> ${data.feats}</p>
                            <p><b>Hasil Calc:</b> ${data.calc}</p>
                            <hr style="border-color: #30363d; margin: 15px 0;">
                            <p><b>Sumber Referensi:</b><br>
                                ${data.link_rt}<br>
                                ${data.link_bukti}
                            </p>
                        </div>
                    `;
                } else {
                    results.innerHTML = `<p class="error-msg">Karakter "${query}" belum tercatat. Silakan analisis dan tambahkan kodenya!</p>`;
                }
            } else {
                alert("Kotak pencarian tidak boleh kosong!");
            }
        }
    </script>

</body>
</html>
