<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dewa Power-Scaling Indexer</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #58a6ff; margin-top: 30px; }
        .search-container { width: 100%; max-width: 600px; margin-bottom: 20px; }
        input[type="text"] {
            width: 100%; padding: 15px; border-radius: 8px;
            border: 1px solid #30363d; background-color: #161b22; color: white;
            font-size: 16px; outline: none;
        }
        button {
            width: 100%; margin-top: 10px; padding: 12px;
            background-color: #238636; color: white; border: none;
            border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .result-container { width: 100%; max-width: 800px; }
        .card {
            background-color: #161b22; padding: 25px; border-radius: 12px;
            border: 1px solid #30363d; line-height: 1.6;
        }
        .header-box { border-bottom: 2px solid #58a6ff; margin-bottom: 15px; padding-bottom: 10px; }
        .tier-tag { background: #58a6ff; color: #0d1117; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .section-title { color: #58a6ff; font-weight: bold; margin-top: 15px; display: block; border-left: 3px solid #238636; padding-left: 10px; }
        .hax-list { background: #0d1117; padding: 10px; border-radius: 6px; font-size: 13px; margin-top: 5px; }
        a { color: #58a6ff; text-decoration: none; font-size: 13px; }
        a:hover { text-decoration: underline; }
        hr { border: 0; border-top: 1px solid #30363d; margin: 20px 0; }
    </style>
</head>
<body>

    <h1>Power-Scaling Indexer</h1>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Ketik nama karakter...">
        <button onclick="searchCharacter()">Cek Database Terlarang</button>
    </div>

    <div id="results" class="result-container"></div>

    <script>
        const database = {
            "makima": {
                fullname: "Makima (Control Devil)",
                verse: "Chainsaw Man",
                tier: "7-C | Up to 4-B with preparation/hax",
                ap: "Town Level (Secara fisik) | Multi-City Block via Bang! | Up to Multi-Continental (Via kontrak Perdana Menteri & mengendalikan Devil kuat).",
                speed: "Massively Hypersonic+ (Reaksi terhadap Gun Devil yang menempuh 500km dalam hitungan detik).",
                durability: "Town Level (Secara fisik) | Multi-Continental (Via transfer kematian ke warga Jepang).",
                hax: `
                    <div class="hax-list">
                        • <b>Conceptual Manipulation:</b> Menghapus konsep melalui Chainsaw Man.<br>
                        • <b>Mind Control:</b> Kontrol mutlak atas siapapun yang dianggap "inferior".<br>
                        • <b>Teleportasi:</b> Melalui kumpulan tikus/binatang kecil.<br>
                        • <b>Immortality Tipe 4 & 8:</b> Bergantung pada nyawa populasi Jepang.<br>
                        • <b>Banishment:</b> Mengirim target ke Neraka secara instan.<br>
                        • <b>Remote Attack:</b> Ritual penghancuran target dari jarak jauh hanya dengan nama.
                    </div>
                `,
                links: `
                    <a href="https://www.reddit.com/r/respectthreads/comments/xkcf5l/respect_makima_chainsaw_man/" target="_blank">📄 Respect Thread (Lengkap)</a> | 
                    <a href="https://vsbattles.fandom.com/wiki/User_blog:The_Calaca/Chainsaw_Man:_Gun_Devil_Speed" target="_blank">📊 Calc Kecepatan Gun Devil</a>
                `
            }
            // Karakter lain akan kita tambahkan di bawah sini nanti
        };

        function searchCharacter() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const results = document.getElementById('results');
            
            if(database[query]) {
                const d = database[query];
                results.innerHTML = `
                    <div class="card">
                        <div class="header-box">
                            <h2 style="margin:0">${d.fullname}</h2>
                            <small>Verse: ${d.verse}</small>
                        </div>
                        <p><span class="tier-tag">Tier: ${d.tier}</span></p>
                        
                        <span class="section-title">Attack Potency (AP)</span>
                        <p style="font-size: 14px;">${d.ap}</p>

                        <span class="section-title">Speed & Reaksi</span>
                        <p style="font-size: 14px;">${d.speed}</p>

                        <span class="section-title">Durability (DP)</span>
                        <p style="font-size: 14px;">${d.durability}</p>

                        <span class="section-title">Abilities & Hax</span>
                        ${d.hax}

                        <hr>
                        <span class="section-title">Referensi Data & Scan</span>
                        ${d.links}
                    </div>
                `;
            } else {
                results.innerHTML = "<p style='text-align:center'>Data karakter belum di-riset. Berikan nama ke AI untuk di-index!</p>";
            }
        }
    </script>
</body>
</html>
