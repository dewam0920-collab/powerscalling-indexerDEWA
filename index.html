<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEWA INDEXER - PRO EDITION</title>
    <style>
        :root { --blue: #58a6ff; --green: #238636; --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 900px; margin: auto; }
        h1 { color: var(--blue); text-align: center; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .search-box { width: 100%; display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: white; }
        button { padding: 12px 20px; background: var(--green); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* DATA LAYOUT */
        .wiki-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; animation: fadeIn 0.5s; }
        .header { background: linear-gradient(45deg, #1f6feb, #238636); padding: 20px; text-align: center; }
        .content { padding: 20px; }
        .section { margin-bottom: 25px; border-left: 4px solid var(--blue); padding-left: 15px; }
        .label { font-weight: bold; color: var(--blue); display: block; margin-bottom: 5px; text-transform: uppercase; font-size: 12px; }
        .hax-grid { display: grid; grid-template-columns: 1fr; gap: 10px; background: #010409; padding: 15px; border-radius: 8px; font-size: 13px; }
        
        /* LINKS & TAGS */
        .link-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; padding: 15px; background: #0d1117; border-radius: 8px; }
        .link-btn { background: #21262d; padding: 8px 12px; border-radius: 4px; border: 1px solid var(--border); color: var(--blue); font-size: 12px; text-decoration: none; }
        .tier-badge { background: #f0883e; color: black; padding: 3px 10px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Dewa Power-Scaling Index</h1>
    <div class="search-box">
        <input type="text" id="target" placeholder="Nama Karakter (e.g. Makima)...">
        <button onclick="search()">RISET</button>
    </div>
    <div id="display"></div>
</div>

<script>
const db = {
    "makima": {
        name: "Makima (The Control Devil)",
        verse: "Chainsaw Man (Cosmology: World of Devils & Concepts)",
        tier: "7-C | Up to 4-B with preparation",
        summary: "Dominasi konsep kontrol. Makima adalah manifestasi dari ketakutan akan kendali. Dalam verse CSM, kekuatan iblis berbanding lurus dengan ketakutan manusia terhadap konsep tersebut.",
        sba: "Standard Battle Assumptions: Makima memulai pertarungan dalam kondisi tenang, mengamati lawan. Jika lawan dianggap 'inferior', ia akan langsung menggunakan Mind Control. Jika lawan mengancam, ia menggunakan 'Bang!' atau ritual pengorbanan.",
        inchar: "In-Character: Dingin, manipulatif, tidak ragu mengorbankan ribuan nyawa manusia. Tidak pernah panik meskipun tubuhnya hancur berkali-kali karena kontrak keabadiannya.",
        stats: {
            ap: "Town Level (Fisik) | Multi-City Block (Bang!) | Star Level (Hax/Preparation via Pochita erasure).",
            speed: "Massively Hypersonic+ (Skala dari Gun Devil 20% yang menempuh 500km dalam hitungan detik).",
            dura: "Town Level (Fisik) | Multi-Continental (Functional Immortality: Kerusakan dialihkan ke warga Jepang).",
            range: "Universal via Animal Spy | Interdimensional via Hell gate."
        },
        hax: [
            "<b>Conceptual Erasure:</b> Melalui Pochita, menghapus konsep dari masa lalu, sekarang, dan masa depan.",
            "<b>Contractual Immortality:</b> Semua serangan mematikan berubah menjadi penyakit/kecelakaan bagi warga Jepang.",
            "<b>Force Manipulation (Bang!):</b> Serangan kinetik tak terlihat yang bisa melempar target ke luar angkasa.",
            "<b>Biological Manipulation:</b> Menggunakan ritual pengorbanan untuk meremukkan target dari jarak jauh hanya dengan nama.",
            "<b>Dimension Banishment:</b> Membuka gerbang neraka melalui Hell Devil.",
            "<b>Mind Manipulation:</b> Kontrol mutlak tanpa resistensi bagi siapapun yang ia anggap lebih rendah."
        ],
        refs: [
            {t: "Ch. 76: Gun Devil Speed Feat", l: "https://vshypothesis.blogspot.com/2020/09/gun-devil-speed-calc.html"},
            {t: "Reddit: Massive Makima Respect Thread", l: "https://www.reddit.com/r/respectthreads/comments/xkcf5l/respect_makima_chainsaw_man/"},
            {t: "V-Battles: Makima Tiering Analysis", l: "https://vsbattles.fandom.com/wiki/Makima"},
            {t: "Scan: Makima Ritual Kill (Ch. 27)", l: "https://imgur.com/a/makima-ritual-PZ5yO8B"}
        ]
    }
};

function search() {
    const q = document.getElementById('target').value.toLowerCase().trim();
    const area = document.getElementById('display');
    if(db[q]) {
        const d = db[q];
        let haxHtml = d.hax.map(h => `<div>${h}</div>`).join('');
        let refHtml = d.refs.map(r => `<a href="${r.l}" target="_blank" class="link-btn">🔗 ${r.t}</a>`).join('');
        
        area.innerHTML = `
            <div class="wiki-card">
                <div class="header">
                    <h2 style="margin:0">${d.name}</h2>
                    <span class="tier-badge">Tier: ${d.tier}</span>
                </div>
                <div class="content">
                    <div class="section">
                        <span class="label">Verse Context</span>
                        <p style="font-size:14px">${d.verse}<br><br>${d.summary}</p>
                    </div>
                    <div class="section" style="background:#1c2128; padding:10px; border-radius:5px">
                        <span class="label">Combat Personality (In-Char & SBA)</span>
                        <p style="font-size:13px"><b>SBA:</b> ${d.sba}</p>
                        <p style="font-size:13px"><b>Behavior:</b> ${d.inchar}</p>
                    </div>
                    <div class="section">
                        <span class="label">Technical Stats (AP/Speed/Dura)</span>
                        <p style="font-size:13px">
                            <b>AP:</b> ${d.stats.ap}<br>
                            <b>Speed:</b> ${d.stats.speed}<br>
                            <b>Durability:</b> ${d.stats.dura}
                        </p>
                    </div>
                    <div class="section">
                        <span class="label">Abilities, Hax & Powers</span>
                        <div class="hax-grid">${haxHtml}</div>
                    </div>
                    <div class="link-bar">
                        <span class="label" style="width:100%">Valid Source & Proof Scans:</span>
                        ${refHtml}
                    </div>
                </div>
            </div>
        `;
    } else {
        area.innerHTML = "<p style='text-align:center; color:red'>Karakter tidak ditemukan. Masukkan nama yang valid untuk di-crawl!</p>";
    }
}
</script>
</body>
</html>
